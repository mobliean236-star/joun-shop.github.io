<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Life Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: black;
  color: white;
}

/* Header */
.header {
  text-align: center;
  padding: 20px;
}

/* Language */
.lang {
  text-align: center;
  margin-bottom: 20px;
}

.lang button {
  margin: 5px;
  padding: 8px 15px;
  border: none;
  background: #c8a97e;
  cursor: pointer;
  border-radius: 5px;
}

/* Section */
.section-title {
  text-align: center;
  margin-top: 30px;
  font-size: 22px;
  border-bottom: 1px solid #444;
  padding-bottom: 10px;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* Card */
.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.price {
  color: #c8a97e;
}

/* Floating buttons */
.float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.float a {
  text-decoration: none;
}

.float button {
  padding: 12px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-weight: bold;
}

/* WhatsApp */
.whatsapp {
  background: #25D366;
  color: white;
}

/* Map */
.mapbtn {
  background: #c8a97e;
}
</style>

<script>
let lang = "en";

const coffee = [
  {en:"Espresso", la:"Espresso", price:"35k"},
  {en:"Americano", la:"Americano", price:"30k"},
  {en:"Cappuccino", la:"Cappuccino", price:"35k"},
  {en:"Latte", la:"Latte", price:"35k"},
  {en:"Mocha", la:"Mocha", price:"40k"},
  {en:"Vanila latte", la:"Vanila latte", price:"40k"},
  {en:"Caramel latte", la:"Caramel latte", price:"45k"},
  {en:"Orange coffee", la:"Orange coffee", price:"45k"},
  {en:"Coconut coffee", la:"Coconut coffee", price:"45k"}
];

const noncoffee = [
  {en:"Matcha coconut", la:"Matcha coconut", price:"50k"},
  {en:"Matcha Latte", la:"Matcha Latte", price:"45k"},
  {en:"Strawberry milk", la:"Strawberry milk", price:"35k"},
  {en:"Cocoa strawberry", la:"Cocoa strawberry", price:"45k"},
  {en:"Cocoalate", la:"Cocoalate", price:"35k"},
  {en:"Matcha Strawberry", la:"Matcha Strawberry", price:"50k"},
  {en:"Green tea", la:"Green tea", price:"35k"},
  {en:"Thai milk tea", la:"Thai milk tea", price:"35k"},
  {en:"Cocoa coconut", la:"Cocoa coconut", price:"45k"}
];

function setLang(l){
  lang = l;
  render();
}

function order(name){
  let text = lang === "la"
    ? "ຂ້ອຍຢາກສັ່ງ " + name
    : "Hello, I would like to order " + name;

  window.open("https://wa.me/8562092747227?text=" + encodeURIComponent(text));
}

function renderCategory(list, containerId){
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  list.forEach(item => {
    const name = lang === "la" ? item.la : item.en;

    container.innerHTML += `
      <div class="card" onclick="order('${name}')">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=400&q=80">
        <div class="card-content">
          <h3>${name}</h3>
          <p class="price">${item.price}</p>
        </div>
      </div>
    `;
  });
}

function render(){
  renderCategory(coffee, "coffee");
  renderCategory(noncoffee, "noncoffee");
}
</script>

</head>

<body onload="render()">

<div class="header">
  <h1>LIFE COFFEE</h1>
  <p style="color:#c8a97e;">SLOWBAR</p>
</div>

<div class="lang">
  <button onclick="setLang('en')">English</button>
  <button onclick="setLang('la')">Lao</button>
</div>

<div class="section-title">COFFEE</div>
<div id="coffee" class="grid"></div>

<div class="section-title">NON COFFEE</div>
<div id="noncoffee" class="grid"></div>

<!-- MAP -->
<div style="text-align:center; padding:30px;">
  <h2 style="color:#c8a97e;">📍 Location</h2>
  <a href="https://www.google.com/maps?q=19.895000663346558,102.14216503795944" target="_blank">
    <button style="padding:10px 20px; background:#c8a97e; border:none; border-radius:5px;">
      Open Map
    </button>
  </a>
</div>

<div style="padding:20px;">
  <iframe 
    src="https://www.google.com/maps?q=19.895000663346558,102.14216503795944&output=embed"
    width="100%" 
    height="300" 
    style="border:0; border-radius:10px;">
  </iframe>
</div>

<!-- FLOATING BUTTONS -->
<div class="float">

  <!-- WhatsApp -->
  <a href="https://wa.me/8562092747227" target="_blank">
    <button class="whatsapp">WhatsApp</button>
  </a>

  <!-- Map -->
  <a href="https://www.google.com/maps?q=19.895000663346558,102.14216503795944" target="_blank">
    <button class="mapbtn">Map</button>
  </a>

</div>

</body>
</html>
