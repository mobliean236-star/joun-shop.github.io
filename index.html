<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:white;
}

/* HEADER */
.header {
  padding:20px;
  text-align:center;
  background:#111;
  border-bottom:1px solid #222;
}

.header h1 {
  margin:0;
  font-size:28px;
  color:#c8a97e;
}

/* MENU */
.menu {
  padding:10px;
}

.item {
  display:flex;
  align-items:center;
  background:#111;
  margin-bottom:10px;
  border-radius:12px;
  overflow:hidden;
}

.item img {
  width:90px;
  height:90px;
  object-fit:cover;
}

.item-info {
  flex:1;
  padding:10px;
}

.price {
  color:#c8a97e;
  font-weight:bold;
}

/* CONTROLS */
.controls {
  display:flex;
  align-items:center;
  gap:8px;
}

.controls button {
  background:#c8a97e;
  border:none;
  width:30px;
  height:30px;
  border-radius:50%;
  font-weight:bold;
}

.qty {
  min-width:20px;
  text-align:center;
}

/* BADGE */
.badge {
  background:#c8a97e;
  color:black;
  font-size:10px;
  padding:2px 6px;
  border-radius:10px;
  margin-bottom:5px;
  display:inline-block;
}

/* CART BAR */
.cart-bar {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:15px;
  border-top:2px solid #c8a97e;
}

.cart-bar button {
  width:100%;
  padding:15px;
  background:#25D366;
  border:none;
  border-radius:30px;
  font-weight:bold;
  color:white;
}
</style>

<script>
let cart = {};

const menu = [
  {name:"Espresso", price:35000},
  {name:"Americano", price:30000},
  {name:"Cappuccino", price:35000},
  {name:"Latte", price:35000},
  {name:"Mocha", price:40000},
  {name:"Vanilla Latte", price:40000},
  {name:"Caramel Latte", price:45000},
  {name:"Orange Coffee", price:45000, best:true},
  {name:"Coconut Coffee", price:45000, best:true},
  {name:"Matcha Coconut", price:50000},
  {name:"Matcha Latte", price:45000},
  {name:"Strawberry Milk", price:35000},
  {name:"Cocoa Strawberry", price:45000},
  {name:"Cocoa Latte", price:35000},
  {name:"Matcha Strawberry", price:50000},
  {name:"Green Tea", price:35000},
  {name:"Thai Milk Tea", price:35000},
  {name:"Cocoa Coconut", price:45000}
];

// ADD
function add(name){
  cart[name]=(cart[name]||0)+1;
  update();
}

// REMOVE
function remove(name){
  if(cart[name]){
    cart[name]--;
    if(cart[name]<=0) delete cart[name];
  }
  update();
}

// UPDATE UI
function update(){
  let total=0;

  menu.forEach(item=>{
    let qty = cart[item.name] || 0;
    document.getElementById("qty-"+item.name).innerText = qty;

    total += qty * item.price;
  });

  document.getElementById("total").innerText =
    "🛒 Order ("+total.toLocaleString()+"₭)";
}

// SEND
function send(){
  let message="Order:\n";
  let total=0;

  for(let item in cart){
    let qty=cart[item];
    let price = menu.find(m=>m.name===item).price;
    total+=price*qty;
    message+=`${item} x${qty}\n`;
  }

  message+="Total: "+total.toLocaleString()+"₭";

  window.open("https://wa.me/8562092747227?text="+encodeURIComponent(message));
}

// RENDER
function render(){
  const container=document.getElementById("menu");

  menu.forEach(item=>{
    container.innerHTML+=`
      <div class="item">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
        <div class="item-info">
          ${item.best ? '<div class="badge">🔥 BEST SELLER</div>' : ''}
          <div>${item.name}</div>
          <div class="price">${item.price.toLocaleString()}₭</div>
        </div>
        <div class="controls">
          <button onclick="remove('${item.name}')">-</button>
          <div id="qty-${item.name}" class="qty">0</div>
          <button onclick="add('${item.name}')">+</button>
        </div>
      </div>
    `;
  });
}
</script>
</head>

<body onload="render()">

<div class="header">
  <h1>LIFE COFFEE</h1>
</div>

<div id="menu" class="menu"></div>

<div class="cart-bar">
  <button id="total" onclick="send()">🛒 Order (0₭)</button>
</div>

</body>
</html>
