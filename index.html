<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:60px;
  background:url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1400&q=80') center/cover;
  position:relative;
}
.header::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}
.header h1 {
  position:relative;
  font-size:45px;
  background:linear-gradient(90deg,#c8a97e,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header p {position:relative;color:#c8a97e;}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  position:relative;
  transition:0.3s;
}
.card:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #c8a97e;
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-content {
  padding:10px;
  text-align:center;
}

.price {
  color:#c8a97e;
  font-weight:bold;
}

/* BEST SELLER */
.badge {
  position:absolute;
  top:10px;
  left:10px;
  background:#c8a97e;
  color:black;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* CONTROLS */
.controls {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.controls button {
  background:#c8a97e;
  border:none;
  width:30px;
  height:30px;
  border-radius:50%;
  font-weight:bold;
}

.qty {
  min-width:20px;
}

/* CART */
.cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:15px;
  border-top:2px solid #c8a97e;
}

.cart button {
  width:100%;
  padding:15px;
  background:#25D366;
  border:none;
  border-radius:30px;
  font-weight:bold;
  color:white;
}
</style>

<script>
let cart = {};

const menu = [
  {name:"Espresso", price:35000},
  {name:"Americano", price:30000},
  {name:"Cappuccino", price:35000},
  {name:"Latte", price:35000},
  {name:"Mocha", price:40000},
  {name:"Vanilla Latte", price:40000},
  {name:"Caramel Latte", price:45000},
  {name:"Orange Coffee", price:45000, best:true},
  {name:"Coconut Coffee", price:45000, best:true},
  {name:"Matcha Coconut", price:50000},
  {name:"Matcha Latte", price:45000},
  {name:"Strawberry Milk", price:35000},
  {name:"Cocoa Strawberry", price:45000},
  {name:"Cocoa Latte", price:35000},
  {name:"Matcha Strawberry", price:50000},
  {name:"Green Tea", price:35000},
  {name:"Thai Milk Tea", price:35000},
  {name:"Cocoa Coconut", price:45000}
];

// ADD / REMOVE
function add(name){
  cart[name]=(cart[name]||0)+1;
  update();
}

function remove(name){
  if(cart[name]){
    cart[name]--;
    if(cart[name]<=0) delete cart[name];
  }
  update();
}

// UPDATE
function update(){
  let total=0;

  menu.forEach(item=>{
    let qty=cart[item.name]||0;
    document.getElementById("qty-"+item.name).innerText=qty;
    total+=qty*item.price;
  });

  document.getElementById("total").innerText =
    "🛒 Order ("+total.toLocaleString()+"₭)";
}

// SEND
function send(){
  let message="Order:\n";
  let total=0;

  for(let item in cart){
    let qty=cart[item];
    let price=menu.find(m=>m.name===item).price;
    total+=price*qty;
    message+=`${item} x${qty}\n`;
  }

  message+="Total: "+total.toLocaleString()+"₭";

  window.open("https://wa.me/8562092747227?text="+encodeURIComponent(message));
}

// RENDER
function render(){
  const container=document.getElementById("menu");

  menu.forEach(item=>{
    container.innerHTML+=`
      <div class="card">
        ${item.best ? '<div class="badge">🔥 BEST SELLER</div>' : ''}
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
        <div class="card-content">
          <h3>${item.name}</h3>
          <p class="price">${item.price.toLocaleString()}₭</p>

          <div class="controls">
            <button onclick="remove('${item.name}')">-</button>
            <div id="qty-${item.name}" class="qty">0</div>
            <button onclick="add('${item.name}')">+</button>
          </div>

        </div>
      </div>
    `;
  });
}
</script>
</head>

<body onload="render()">

<div class="header">
  <h1>LIFE COFFEE</h1>
  <p>SLOWBAR</p>
</div>

<div id="menu" class="grid"></div>

<div class="cart">
  <button id="total" onclick="send()">🛒 Order (0₭)</button>
</div>

</body>
</html>
