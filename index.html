<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Coffee - SLOWBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
/* GLOBAL */
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #000;
  color: #fff;
  overflow-x: hidden;
}

/* HEADER */
.header {
  position: relative;
  text-align: center;
  padding: 60px 20px;
  background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
  color: white;
  overflow: hidden;
}

.header::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.header h1 {
  font-size: 48px;
  font-weight: 600;
  margin: 0;
  background: linear-gradient(90deg, #c8a97e, #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  z-index: 1;
  position: relative;
  animation: fadeInUp 1s ease forwards;
}

.header p {
  margin-top: 10px;
  font-size: 24px;
  font-weight: 300;
  color: #c8a97e;
  z-index: 1;
  position: relative;
  animation: fadeInUp 1.3s ease forwards;
}

@keyframes fadeInUp {
  0% {opacity:0; transform: translateY(20px);}
  100% {opacity:1; transform: translateY(0);}
}

/* SECTION TITLES */
.section-title {
  text-align: center;
  margin: 40px 0 20px;
  font-size: 26px;
  border-bottom: 2px solid #444;
  padding-bottom: 10px;
  letter-spacing: 1px;
}

/* GRID CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
  padding: 0 20px 40px;
}

.card {
  background: #111;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #c8a97e;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  transition: transform 0.3s;
}

.card:hover img {
  transform: scale(1.1);
}

.card-content {
  padding: 15px;
  text-align: center;
}

.card-content h3 {
  margin: 10px 0 5px;
  font-size: 20px;
}

.card-content p {
  margin: 0;
  color: #c8a97e;
  font-weight: 600;
  font-size: 18px;
}

/* QUICK ORDER BAR */
.quick-order {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a1a;
  border-radius: 50px;
  display: flex;
  gap: 15px;
  padding: 10px 20px;
  box-shadow: 0 0 20px #c8a97e;
  z-index: 100;
}

.quick-order button {
  background: #c8a97e;
  border: none;
  border-radius: 50px;
  padding: 12px 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.quick-order button:hover {
  background: #fff;
  color: #c8a97e;
}

/* FLOATING BUTTONS */
.float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.float a button {
  padding: 14px 20px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.whatsapp {background: #25D366; color: #fff;}
.whatsapp:hover {background: #128C7E;}

.mapbtn {background: #c8a97e; color: #000;}
.mapbtn:hover {background: #fff; color: #c8a97e;}

/* MAP IFRAME */
.map-container {
  padding: 20px;
}

.map-container iframe {
  width: 100%;
  height: 300px;
  border: 0;
  border-radius: 15px;
}

/* ANIMATIONS ON LOAD */
@keyframes fadeIn {
  0% {opacity:0;}
  100% {opacity:1;}
}

.card {
  opacity: 0;
  animation: fadeIn 0.5s ease forwards;
}

.card:nth-child(1) {animation-delay: 0.1s;}
.card:nth-child(2) {animation-delay: 0.2s;}
.card:nth-child(3) {animation-delay: 0.3s;}
.card:nth-child(4) {animation-delay: 0.4s;}
.card:nth-child(5) {animation-delay: 0.5s;}
.card:nth-child(6) {animation-delay: 0.6s;}
</style>

<script>
// Données boissons avec image (à remplacer par tes photos)
const coffee = [
  {name:"Espresso", price:"35₭", img:"images/espresso.jpg"},
  {name:"Americano", price:"30₭", img:"images/americano.jpg"},
  {name:"Cappuccino", price:"35₭", img:"images/cappuccino.jpg"},
  {name:"Latte", price:"35₭", img:"images/latte.jpg"},
  {name:"Mocha", price:"40₭", img:"images/mocha.jpg"}
];

const noncoffee = [
  {name:"Matcha Coconut", price:"50₭", img:"images/matcha_coconut.jpg"},
  {name:"Strawberry Milk", price:"35₭", img:"images/strawberry_milk.jpg"},
  {name:"Cocoa Latte", price:"35₭", img:"images/cocoa_latte.jpg"},
  {name:"Thai Milk Tea", price:"35₭", img:"images/thai_milk_tea.jpg"}
];

// Commande rapide WhatsApp
function order(name){
  const text = "Hello, I would like to order " + name;
  window.open("https://wa.me/8562092747227?text=" + encodeURIComponent(text), "_blank");
}

// Render cartes
function renderCategory(list, containerId){
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  list.forEach(item => {
    container.innerHTML += `
      <div class="card" onclick="order('${item.name}')">
        <img src="${item.img}" alt="${item.name}">
        <div class="card-content">
          <h3>${item.name}</h3>
          <p>${item.price}</p>
        </div>
      </div>
    `;
  });
}

// Quick Order bar
function renderQuickOrder(list){
  const container = document.getElementById("quick-order");
  container.innerHTML = "";
  list.slice(0,3).forEach(item => {
    container.innerHTML += `<button onclick="order('${item.name}')">${item.name}</button>`;
  });
}

// Init
function render(){
  renderCategory(coffee, "coffee");
  renderCategory(noncoffee, "noncoffee");
  renderQuickOrder([...coffee,...noncoffee]);
}
</script>
</head>

<body onload="render()">

<!-- HEADER -->
<div class="header">
  <h1>LIFE COFFEE</h1>
  <p>SLOWBAR</p>
</div>

<!-- COFFEE -->
<div class="section-title">COFFEE</div>
<div id="coffee" class="grid"></div>

<!-- NON COFFEE -->
<div class="section-title">NON COFFEE</div>
<div id="noncoffee" class="grid"></div>

<!-- MAP -->
<div class="map-container">
  <h2 style="color:#c8a97e; text-align:center;">📍 Location</h2>
  <iframe src="https://www.google.com/maps?q=19.895000663346558,102.14216503795944&output=embed"></iframe>
</div>

<!-- QUICK ORDER BAR -->
<div id="quick-order" class="quick-order"></div>

<!-- FLOATING BUTTONS -->
<div class="float">
  <a href="https://wa.me/8562092747227" target="_blank"><button class="whatsapp">WhatsApp</button></a>
  <a href="https://www.google.com/maps?q=19.895000663346558,102.14216503795944" target="_blank"><button class="mapbtn">Map</button></a>
</div>

</body>
</html>
